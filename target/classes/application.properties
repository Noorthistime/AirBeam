# ===============================
# SERVER
# ===============================
server.port=${PORT:8082}
server.address=0.0.0.0

# ===============================
# DATABASE
# Local default uses MySQL. Render uses PostgreSQL.
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:p2p_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FILE STORAGE PATH
# ===============================
file.storage.path=${FILE_STORAGE_PATH:storage/}

# ===============================
# MULTIPART CONFIG (for file upload)
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
