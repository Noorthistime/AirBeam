# ===============================
# SERVER
# ===============================
server.port=${PORT:8082}
server.address=0.0.0.0

# ===============================
# DATABASE
# Local default uses MySQL. Render can use PostgreSQL with:
# DATABASE_URL=jdbc:postgresql://HOST:5432/DATABASE
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/p2p_db}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:alien}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FILE STORAGE PATH
# ===============================
file.storage.path=${FILE_STORAGE_PATH:storage/}

# ===============================
# MULTIPART CONFIG (for file upload)
# ===============================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
