<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>P2P Nexus | Luxury File Sharing</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg: #fcfaf8;
            --panel: rgba(255, 255, 255, 0.85);
            --panel-strong: #ffffff;
            --ink: #1a1a1a;
            --muted: #666666;
            --line: rgba(0, 0, 0, 0.08);
            --accent: #b89c7d; /* Soft Gold/Bronze */
            --accent-hover: #a68b6a;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg: #121212;
            --panel: rgba(30, 30, 30, 0.85);
            --panel-strong: #1e1e1e;
            --ink: #e0e0e0;
            --muted: #a0a0a0;
            --line: rgba(255, 255, 255, 0.08);
            --accent: #8c8c8c; /* Elegant Silver/Gray */
            --accent-hover: #707070;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: var(--font-body);
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(184, 156, 125, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(184, 156, 125, 0.05) 0px, transparent 50%);
            line-height: 1.6;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--line);
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: var(--font-body);
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .view {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .view.active {
            display: block;
        }

        /* Landing Page / Auth View */
        .landing-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 80px;
            align-items: center;
            min-height: 60vh;
        }

        .hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 25px;
            color: var(--ink);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--muted);
            max-width: 500px;
        }

        .auth-panel {
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--line);
        }

        .auth-tab {
            padding: 10px 0;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
        }

        .auth-tab.active {
            color: var(--ink);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form.active {
            display: flex;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: var(--panel-strong);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px 18px;
            color: var(--ink);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(184, 156, 125, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(184, 156, 125, 0.2);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--ink);
        }

        .btn-ghost:hover {
            background: var(--panel-strong);
        }

        /* Dashboard View */
        .dashboard-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .dashboard-header h2 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .user-info {
            background: var(--panel);
            padding: 15px 25px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            text-align: right;
        }

        .user-info strong {
            display: block;
            font-size: 1.1rem;
        }

        .user-info span {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .card h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .file-item {
            background: var(--panel-strong);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.3s ease;
        }

        .file-item:hover {
            transform: scale(1.01);
        }

        .file-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .file-details h4 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .file-meta {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-owner {
            background: rgba(184, 156, 125, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .badge-received {
            background: rgba(0, 0, 0, 0.05);
            color: var(--muted);
            border: 1px solid var(--line);
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .share-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .share-tag {
            background: var(--bg);
            border: 1px solid var(--line);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .share-tag button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-weight: bold;
        }

        .share-tag button:hover {
            color: var(--ink);
        }

        .share-input-group {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }

        .share-input-group.active {
            display: flex;
        }

        .message {
            padding: 12px 15px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }

        .message.active {
            display: block;
        }

        .message-success {
            background: rgba(184, 156, 125, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .message-error {
            background: rgba(0, 0, 0, 0.05);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .landing-grid, .main-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .hero { text-align: center; }
            .hero p { margin: 0 auto; }
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 20px; }
        }

        /* Removing harsh reds */
        .btn-danger {
            background: transparent;
            border: 1px solid var(--line);
            color: var(--muted);
        }
        .btn-danger:hover {
            background: rgba(0,0,0,0.05);
            color: var(--ink);
        }
    </style>
</head>
<body>
<main class="page">
    <header>
        <div class="logo">
            <div class="logo-icon">PN</div>
            P2P NEXUS
        </div>
        <div class="header-actions">
            <button id="themeToggle" class="btn btn-ghost">Dark Mode</button>
            <button id="logoutBtn" class="btn btn-ghost" style="display: none;">Sign Out</button>
        </div>
    </header>

    <!-- Auth View -->
    <section id="authView" class="view active">
        <div class="landing-grid">
            <div class="hero">
                <h1>Elegant file sharing, redefined.</h1>
                <p>Private, secure, and seamless. Share your world with a touch of luxury.</p>
            </div>
            <div class="auth-panel">
                <div class="auth-tabs">
                    <div class="auth-tab active" data-tab="loginTab">Login</div>
                    <div class="auth-tab" data-tab="signupTab">Sign Up</div>
                </div>

                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>Your Personal ID</label>
                        <input id="loginId" placeholder="e.g. ID-123" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Enter Nexus</button>
                </form>

                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input id="signupName" placeholder="e.g. Alexander Pierce" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
                <div id="authMessage" class="message"></div>
            </div>
        </div>
    </section>

    <!-- App View -->
    <section id="appView" class="view">
        <div class="dashboard-header">
            <div>
                <h2>Your Collection</h2>
                <p class="muted">Manage your shared world.</p>
            </div>
            <div class="user-info">
                <strong id="userName"></strong>
                <span id="userId"></span>
            </div>
        </div>

        <div class="main-grid">
            <aside>
                <div class="card">
                    <h3>Upload</h3>
                    <form id="uploadForm" class="stack" style="display: grid; gap: 20px;">
                        <div class="form-group">
                            <label>Select File</label>
                            <input id="fileInput" type="file" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Upload to Nexus</button>
                    </form>
                    <div id="uploadMessage" class="message"></div>
                </div>
            </aside>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3>Accessible Items</h3>
                    <button id="refreshBtn" class="btn btn-ghost" style="padding: 8px 16px; font-size: 0.85rem;">Refresh</button>
                </div>
                <div id="fileList" class="file-list">
                    <div class="muted">No items in your collection yet.</div>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const authView = document.getElementById('authView');
    const appView = document.getElementById('appView');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const authTabs = document.querySelectorAll('.auth-tab');
    const authForms = document.querySelectorAll('.auth-form');
    const fileList = document.getElementById('fileList');
    const uploadForm = document.getElementById('uploadForm');
    const refreshBtn = document.getElementById('refreshBtn');

    let user = JSON.parse(localStorage.getItem('nexusUser') || 'null');
    let theme = localStorage.getItem('nexusTheme') || 'light';

    // Theme Management
    function applyTheme(t) {
        document.documentElement.dataset.theme = t;
        themeToggle.textContent = t === 'dark' ? 'Light Mode' : 'Dark Mode';
        localStorage.setItem('nexusTheme', t);
    }
    themeToggle.addEventListener('click', () => {
        theme = theme === 'light' ? 'dark' : 'light';
        applyTheme(theme);
    });
    applyTheme(theme);

    // Tab Switching
    authTabs.forEach(tab => {
        tab.addEventListener('click', () => {
            authTabs.forEach(t => t.classList.remove('active'));
            authForms.forEach(f => f.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active');
        });
    });

    // Auth Actions
    async function api(url, body) {
        const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Action failed');
        return data;
    }

    function showView(isApp) {
        authView.classList.toggle('active', !isApp);
        appView.classList.toggle('active', isApp);
        logoutBtn.style.display = isApp ? 'block' : 'none';
        if (isApp) {
            document.getElementById('userName').textContent = user.displayName;
            document.getElementById('userId').textContent = `ID: ${user.userId}`;
            loadFiles();
        }
    }

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            user = await api('/users/login', { userId: document.getElementById('loginId').value });
            localStorage.setItem('nexusUser', JSON.stringify(user));
            showView(true);
        } catch (err) {
            showMsg('authMessage', err.message, true);
        }
    });

    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            user = await api('/users/sign-in', { displayName: document.getElementById('signupName').value });
            localStorage.setItem('nexusUser', JSON.stringify(user));
            showView(true);
        } catch (err) {
            showMsg('authMessage', err.message, true);
        }
    });

    logoutBtn.addEventListener('click', () => {
        user = null;
        localStorage.removeItem('nexusUser');
        showView(false);
    });

    function showMsg(id, text, isErr = false) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `message active ${isErr ? 'message-error' : 'message-success'}`;
        setTimeout(() => el.classList.remove('active'), 5000);
    }

    // File Management
    async function loadFiles() {
        try {
            const res = await fetch(`/file?userId=${user.userId}`);
            const files = await res.json();
            renderFiles(files);
        } catch (err) {
            console.error(err);
        }
    }

    function renderFiles(files) {
        if (files.length === 0) {
            fileList.innerHTML = '<div class="muted">No items in your collection yet.</div>';
            return;
        }
        fileList.innerHTML = files.map(file => `
            <div class="file-item">
                <div class="file-info">
                    <div class="file-details">
                        <h4>${file.fileName}</h4>
                        <div class="file-meta">${(file.fileSize / 1024 / 1024).toFixed(2)} MB • ${file.owner ? 'Owned' : 'Shared by ' + file.ownerDisplayName}</div>
                    </div>
                    <span class="badge ${file.owner ? 'badge-owner' : 'badge-received'}">${file.owner ? 'Owner' : 'Received'}</span>
                </div>
                
                ${file.owner ? `
                    <div class="share-tag-list">
                        ${file.sharedWithUsers.map(u => `
                            <div class="share-tag">
                                ${u.displayName}
                                <button onclick="revoke('${file.fileId}', '${u.userId}')">&times;</button>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="file-actions">
                    <a href="${file.downloadUrl}" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">Download</a>
                    ${file.owner ? `<button class="btn btn-ghost" onclick="toggleShare('${file.fileId}')" style="padding: 8px 16px; font-size: 0.85rem;">Share</button>` : ''}
                    ${file.owner ? `<button class="btn btn-danger" onclick="deleteFile('${file.fileId}')" style="padding: 8px 16px; font-size: 0.85rem;">Remove</button>` : ''}
                </div>

                <div id="share-${file.fileId}" class="share-input-group">
                    <input id="share-input-${file.fileId}" placeholder="Enter Recipient ID" style="flex: 1; padding: 8px 12px;">
                    <button class="btn btn-primary" onclick="shareFile('${file.fileId}')" style="padding: 8px 16px; font-size: 0.85rem;">Give Access</button>
                </div>
            </div>
        `).join('');
    }

    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('file', document.getElementById('fileInput').files[0]);
        formData.append('userId', user.userId);
        
        showMsg('uploadMessage', 'Uploading to Nexus...');
        try {
            const res = await fetch('/file/upload', { method: 'POST', body: formData });
            if (!res.ok) throw new Error('Upload failed');
            showMsg('uploadMessage', 'File secured in your collection.');
            uploadForm.reset();
            loadFiles();
        } catch (err) {
            showMsg('uploadMessage', err.message, true);
        }
    });

    window.toggleShare = (id) => {
        document.getElementById(`share-${id}`).classList.toggle('active');
    };

    window.shareFile = async (fileId) => {
        const sharedWithUserId = document.getElementById(`share-input-${fileId}`).value;
        try {
            const res = await fetch('/file/share', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileId, ownerUserId: user.userId, sharedWithUserId })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            loadFiles();
        } catch (err) {
            alert(err.message);
        }
    };

    window.revoke = async (fileId, sharedWithUserId) => {
        try {
            await fetch(`/file/${fileId}/share?ownerUserId=${user.userId}&sharedWithUserId=${sharedWithUserId}`, { method: 'DELETE' });
            loadFiles();
        } catch (err) {
            console.error(err);
        }
    };

    window.deleteFile = async (fileId) => {
        if (!confirm('Are you sure you want to remove this item from Nexus?')) return;
        try {
            await fetch(`/file/${fileId}?userId=${user.userId}`, { method: 'DELETE' });
            loadFiles();
        } catch (err) {
            console.error(err);
        }
    };

    refreshBtn.addEventListener('click', loadFiles);

    if (user) showView(true);
</script>
</body>
</html>
