<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>P2P Nexus | Luxury File Sharing</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7f6;
            --background: #f4f7f6;
            --panel: rgba(255, 255, 255, 0.62);
            --panel-strong: rgba(255, 255, 255, 0.82);
            --ink: #0f172a;
            --muted: #475569;
            --line: rgba(15, 118, 110, 0.12);
            --border: rgba(15, 118, 110, 0.18);
            --accent: #0f766e;
            --accent-hover: #22d3ee;
            --destructive: #dc2626;
            --shadow: 0 10px 40px -10px rgba(15, 118, 110, 0.12), 0 40px 100px rgba(15, 118, 110, 0.1);
            --card-hover-shadow: 0 20px 50px -15px rgba(15, 118, 110, 0.18), 0 50px 120px rgba(15, 118, 110, 0.15);
            --radius: 24px;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            --primary-gradient: linear-gradient(135deg, #22d3ee, #4ade80);
            --button-glow: 0 0 15px rgba(34, 211, 238, 0.2), 0 0 35px rgba(74, 222, 128, 0.15);
            --button-glow-hover: 0 0 25px rgba(34, 211, 238, 0.3), 0 0 50px rgba(74, 222, 128, 0.2);
            --focus-ring: 0 0 0 4px rgba(34, 211, 238, 0.25), 0 0 15px rgba(34, 211, 238, 0.15);
            --card-bg: rgba(255, 255, 255, 0.55);
            --card-border: rgba(15, 118, 110, 0.18);
            --input-bg: rgba(255, 255, 255, 0.92);
            --input-border: rgba(15, 118, 110, 0.25);
            --text-soft: #334155;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg: oklch(0.145 0 0);
            --background: oklch(0.145 0 0);
            --panel: rgba(18, 20, 28, 0.74);
            --panel-strong: rgba(24, 26, 33, 0.92);
            --ink: oklch(0.985 0 0);
            --muted: rgba(255, 255, 255, 0.68);
            --line: rgba(255, 255, 255, 0.12);
            --border: rgba(239, 68, 68, 0.22);
            --accent: #ef4444;
            --accent-hover: #fb923c;
            --destructive: #f87171;
            --shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.6), 0 50px 120px rgba(0, 0, 0, 0.8), 0 0 30px rgba(239, 68, 68, 0.05);
            --card-hover-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.8), 0 70px 150px rgba(0, 0, 0, 1), 0 0 50px rgba(239, 68, 68, 0.15);
            --radius: 24px;
            --primary-gradient: linear-gradient(135deg, #ef4444, #f97316);
            --button-glow: 0 0 15px rgba(249, 115, 22, 0.25), 0 0 40px rgba(239, 68, 68, 0.15);
            --button-glow-hover: 0 0 25px rgba(249, 115, 22, 0.35), 0 0 55px rgba(239, 68, 68, 0.25);
            --focus-ring: 0 0 0 4px rgba(249, 115, 22, 0.25), 0 0 15px rgba(249, 115, 22, 0.15);
            --card-bg: rgba(28, 28, 34, 0.70);
            --card-border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.18);
            --text-soft: rgba(255, 255, 255, 0.72);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: var(--font-body);
            background-color: var(--bg);
            line-height: 1.65;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.35s ease, color 0.35s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
            background: radial-gradient(circle at 10% 12%, rgba(16, 185, 129, 0.18), transparent 12%),
                radial-gradient(circle at 90% 88%, rgba(56, 189, 248, 0.14), transparent 16%);
            filter: blur(90px);
            opacity: 0.85;
        }

        html[data-theme="dark"] body::before {
            background: radial-gradient(circle at 8% 12%, rgba(59, 130, 246, 0.20), transparent 14%),
                radial-gradient(circle at 92% 88%, rgba(139, 92, 246, 0.18), transparent 18%);
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px 80px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 22px 24px;
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(24px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            transition: background 0.35s ease, border-color 0.35s ease;
        }

        html[data-theme="dark"] header {
            background: rgba(18, 20, 28, 0.82);
        }

        .logo {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--ink);
            display: flex;
            align-items: center;
            gap: 14px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            background: var(--accent);
            border-radius: 14px;
            display: grid;
            place-items: center;
            color: white;
            font-family: var(--font-body);
            font-size: 0.9rem;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.16);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--panel);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--ink);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, background 0.35s ease, border-color 0.35s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.04);
        }

        .theme-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .view {
            display: none;
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }

        .view.active {
            display: block;
        }

        #authView::before,
        #appView::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            filter: blur(100px);
            opacity: 0.75;
        }

        #authView::before {
            background: radial-gradient(circle at 12% 15%, rgba(59, 130, 246, 0.20), transparent 14%),
                radial-gradient(circle at 88% 88%, rgba(139, 92, 246, 0.18), transparent 18%);
        }

        #appView::before {
            background: radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.08), transparent 26%),
                radial-gradient(circle at 50% 100%, rgba(139, 92, 246, 0.08), transparent 30%);
        }

        html[data-theme="light"] #authView::before {
            background: radial-gradient(circle at 12% 15%, rgba(16, 185, 129, 0.16), transparent 14%),
                radial-gradient(circle at 88% 88%, rgba(56, 189, 248, 0.14), transparent 18%);
        }

        html[data-theme="light"] #appView::before {
            background: radial-gradient(circle at 50% 0%, rgba(16, 185, 129, 0.06), transparent 26%),
                radial-gradient(circle at 50% 100%, rgba(56, 189, 248, 0.06), transparent 30%);
        }

        .landing-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 64px;
            align-items: center;
            min-height: calc(100vh - 160px);
        }

        .hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 4.8rem);
            line-height: 1.05;
            margin-bottom: 24px;
            color: var(--ink);
        }

        .hero p {
            font-size: 1.15rem;
            color: var(--text-soft);
            max-width: 520px;
        }

        .auth-panel,
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 36px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(30px);
            transition: transform 0.45s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.45s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .auth-panel:hover,
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--card-hover-shadow);
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 8px;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 14px 16px;
            border-radius: 999px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .auth-tab.active {
            color: white;
            background: var(--primary-gradient);
            box-shadow: 0 16px 40px rgba(34, 211, 238, 0.18);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .auth-form.active {
            display: flex;
        }

        .form-group label {
            font-size: 0.84rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        textarea,
        select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 18px;
            padding: 16px 18px;
            color: var(--ink);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="file"] {
            width: 100%;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--muted);
            opacity: 1;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: var(--focus-ring);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
            box-shadow: var(--button-glow);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            border-radius: 20px;
            min-height: 52px;
            padding: 0 22px;
            animation: pulseGlow 3.5s infinite alternate ease-in-out;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.35s ease;
        }

        .full-width-btn {
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: var(--button-glow-hover);
            animation-play-state: paused;
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid var(--border);
            color: var(--ink);
            min-height: 48px;
            padding: 0 18px;
            border-radius: 18px;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .header-actions .btn-ghost {
            min-width: 130px;
            padding: 0 20px;
            border-radius: 20px;
        }

        .btn-pill {
            border-radius: 999px;
            min-width: 130px;
        }

        #profileBtn {
            background: rgba(249, 115, 22, 0.18);
            border-color: rgba(249, 115, 22, 0.35);
            color: #ffedd5;
        }

        html:not([data-theme="dark"]) #profileBtn {
            background: rgba(15, 118, 110, 0.12);
            border-color: rgba(15, 118, 110, 0.25);
            color: #0f766e;
        }

        #logoutBtn {
            background: rgba(239, 68, 68, 0.18);
            border-color: rgba(239, 68, 68, 0.35);
            color: #fee2e2;
        }

        html:not([data-theme="dark"]) #logoutBtn {
            background: rgba(15, 118, 110, 0.12);
            border-color: rgba(15, 118, 110, 0.25);
            color: #0f766e;
        }

        html:not([data-theme="dark"]) #themeToggle {
            background: rgba(15, 118, 110, 0.12);
            border-color: rgba(15, 118, 110, 0.25);
            color: #0f766e;
        }

        .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 999px;
            padding: 0;
            min-width: 48px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.1);
        }

        #themeToggle {
            width: 52px;
            height: 52px;
            background: rgba(249, 115, 22, 0.18);
            border-color: rgba(249, 115, 22, 0.35);
            color: #ffedd5;
            box-shadow: 0 18px 45px rgba(249, 115, 22, 0.16);
        }

        html[data-theme="dark"] .btn-ghost {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .stack {
            display: grid;
            gap: 20px;
        }

        .stack .btn {
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        .dashboard-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
        }

        .dashboard-header h2 {
            font-family: var(--font-heading);
            font-size: clamp(2.3rem, 4vw, 3rem);
            margin-bottom: 6px;
        }

        .dashboard-header p {
            color: var(--muted);
            font-size: 1rem;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.65);
            padding: 18px 26px;
            border-radius: 24px;
            border: 1px solid var(--border);
            text-align: right;
            color: var(--ink);
        }

        html[data-theme="dark"] .user-info {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .user-info strong {
            display: block;
            font-size: 1.1rem;
            color: var(--ink);
        }

        .user-info span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .user-info span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            gap: 28px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .file-item {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 28px;
            border: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            gap: 18px;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.08);
        }

        .file-item:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.22);
            box-shadow: 0 30px 85px rgba(59, 130, 246, 0.12);
        }

        .file-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
        }

        .file-details h4 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--ink);
        }

        .file-meta {
            font-size: 0.9rem;
            color: var(--muted);
        }

        .badge {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .badge-owner {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        html:not([data-theme="dark"]) .badge-owner {
            background: rgba(15, 118, 110, 0.12);
            color: #0f766e;
            border-color: rgba(15, 118, 110, 0.25);
        }

        .badge-received {
            background: rgba(255, 255, 255, 0.14);
            color: var(--muted);
            border: 1px solid var(--card-border);
        }

        .file-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .share-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }

        .share-tag {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid var(--card-border);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.82rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .share-tag button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-weight: 900;
            font-size: 1rem;
            line-height: 1;
        }

        .share-tag button:hover {
            color: var(--accent);
        }

        .share-input-group {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }

        .share-input-group.active {
            display: flex;
        }

        .message {
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            margin-top: 15px;
            display: none;
        }

        .message.active {
            display: block;
        }

        .message-success {
            background: rgba(34, 211, 238, 0.12);
            color: #0f766e;
            border: 1px solid rgba(34, 211, 238, 0.22);
        }

        .message-error {
            background: rgba(248, 113, 113, 0.12);
            color: #f97316;
            border: 1px solid rgba(248, 113, 113, 0.22);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @media (max-width: 900px) {

            .landing-grid,
            .main-grid {
                grid-template-columns: 1fr;
                gap: 36px;
            }

            .hero {
                text-align: center;
            }

            .hero p {
                margin: 0 auto;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            header {
                border-radius: 0;
                padding: 18px 20px;
            }
        }

        .btn-danger {
            background: transparent;
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.08);
            border-color: #ef4444;
            color: #ef4444;
        }

        html:not([data-theme="dark"]) .btn-danger {
            border-color: rgba(15, 118, 110, 0.3);
            color: #0f766e;
        }

        html:not([data-theme="dark"]) .btn-danger:hover {
            background: rgba(15, 118, 110, 0.08);
            border-color: #0f766e;
            color: #0f766e;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: var(--button-glow);
            }

            100% {
                box-shadow: var(--button-glow-hover);
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header>
            <div class="logo">
                <div class="logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2 11 13" />
                        <path d="M22 2 15 22 11 13 2 9 22 2z" />
                    </svg>
                </div>
                AirBeam
            </div>
            <div class="header-actions" style="position: relative;">
                <button id="profileBtn" class="btn btn-ghost btn-pill" style="display: none;">Profile</button>
                <button id="themeToggle" class="btn btn-circle theme-toggle" aria-label="Toggle theme"><span
                        class="theme-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                        </svg></span></button>
                <button id="logoutBtn" class="btn btn-ghost btn-pill" style="display: none;">Sign Out</button>

                <section class="card hidden" id="profileCard"
                    style="position: absolute; top: calc(100% + 15px); right: 0; width: 340px; z-index: 100;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h3 style="margin: 0;">Profile</h3>
                        <button type="button" id="closeProfileBtn" class="btn btn-ghost"
                            style="padding: 4px 10px; font-size: 0.8rem; min-height: 32px;">Cancel</button>
                    </div>
                    <p><strong>Name:</strong> <span id="profileName">User Name</span></p>
                    <p><strong>ID:</strong> <span id="profileId">Unknown</span></p>
                    <p><strong>Password:</strong> <span id="profilePassword">••••••••</span></p>
                    <div style="margin-top:12px;">
                        <button id="changePasswordBtn" class="btn btn-ghost">Change Password</button>
                    </div>
                    <form id="passwordForm" class="hidden" style="margin-top:16px; display:grid; gap:12px;">
                        <label for="currentPassword">Current Password</label>
                        <div style="position:relative;">
                            <input id="currentPassword" type="password" required
                                style="width:100%; padding-right:40px;">
                            <button type="button" class="toggle-password" data-target="currentPassword"
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                        <label for="newPassword">New Password</label>
                        <div style="position:relative;">
                            <input id="newPassword" type="password" required style="width:100%; padding-right:40px;">
                            <button type="button" class="toggle-password" data-target="newPassword"
                                style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <button type="button" id="cancelPasswordBtn" class="btn btn-ghost">Cancel</button>
                        </div>
                        <div id="passwordMessage" class="message"></div>
                    </form>
                </section>
            </div>
        </header>

        <!-- Auth View -->
        <section id="authView" class="view active">
            <div class="landing-grid">
                <div class="hero">
                    <h1>Elegant file sharing, redefined.</h1>
                    <p>Private, secure, and seamless. Share your world with a touch of luxury.</p>
                </div>
                <div class="auth-panel">
                    <div class="auth-tabs">
                        <div class="auth-tab active" data-tab="loginForm">Login</div>
                        <div class="auth-tab" data-tab="signupForm">Sign Up</div>
                    </div>

                    <form id="loginForm" class="auth-form active">
                        <div class="form-group">
                            <label>Your Personal ID</label>
                            <input id="loginId" placeholder="e.g. ID-123" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input id="loginPassword" type="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary full-width-btn">Enter Nexus</button>
                    </form>

                    <form id="signupForm" class="auth-form">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input id="signupName" placeholder="e.g. Alexander Pierce" required>
                        </div>
                        <div class="form-group">
                            <label>Set Password</label>
                            <input id="signupPassword" type="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary full-width-btn">Create Account</button>
                    </form>
                    <div id="authMessage" class="message"></div>
                </div>
            </div>
        </section>

        <!-- App View -->
        <section id="appView" class="view">
            <div class="dashboard-header">
                <div>
                    <h2>Your Collection</h2>
                    <p class="muted">Manage your shared world.</p>
                </div>
                <div class="user-info">
                    <strong id="userName"></strong>
                    <span id="userId"></span>
                </div>
            </div>

            <div class="main-grid">
                <aside style="display: flex; flex-direction: column; gap: 20px;">

                    <div class="card">
                        <h3>Upload</h3>
                        <form id="uploadForm" class="stack" style="display: grid; gap: 20px;">
                            <div class="form-group">
                                <label>Select File</label>
                                <input id="fileInput" type="file" required>
                            </div>
                            <button type="submit" class="btn btn-primary full-width-btn">Upload to Nexus</button>
                        </form>
                        <div id="uploadMessage" class="message"></div>
                    </div>
                </aside>

                <div class="card">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                        <h3>Accessible Items</h3>
                        <button id="refreshBtn" class="btn btn-ghost"
                            style="padding: 8px 16px; font-size: 0.85rem;">Refresh</button>
                    </div>
                    <div id="fileList" class="file-list">
                        <div class="muted">No items in your collection yet.</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const profileBtn = document.getElementById('profileBtn');
        const profileCard = document.getElementById('profileCard');
        const authView = document.getElementById('authView');
        const appView = document.getElementById('appView');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const authTabs = document.querySelectorAll('.auth-tab');
        const authForms = document.querySelectorAll('.auth-form');
        const fileList = document.getElementById('fileList');
        const uploadForm = document.getElementById('uploadForm');
        const refreshBtn = document.getElementById('refreshBtn');
        const profileName = document.getElementById('profileName');
        const profileId = document.getElementById('profileId');
        const profilePassword = document.getElementById('profilePassword');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        const passwordForm = document.getElementById('passwordForm');
        const cancelPasswordBtn = document.getElementById('cancelPasswordBtn');

        let user = JSON.parse(localStorage.getItem('nexusUser') || 'null');
        let theme = localStorage.getItem('nexusTheme') || 'light';

        // Theme Management
        function applyTheme(t) {
            document.documentElement.dataset.theme = t;
            const icon = themeToggle.querySelector('.theme-icon');
            if (icon) {
                icon.innerHTML = t === 'dark'
                    ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
                    : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
            }
            themeToggle.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            localStorage.setItem('nexusTheme', t);
        }
        themeToggle.addEventListener('click', () => {
            theme = theme === 'light' ? 'dark' : 'light';
            applyTheme(theme);
        });
        applyTheme(theme);

        // Password Toggle
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function () {
                const input = document.getElementById(this.dataset.target);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"/></svg>';
                } else {
                    input.type = 'password';
                    this.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
                }
            });
        });

        // Tab Switching
        authTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                authTabs.forEach(t => t.classList.remove('active'));
                authForms.forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // Auth Actions
        async function api(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Action failed');
            return data;
        }

        function showView(isApp) {
            authView.classList.toggle('active', !isApp);
            appView.classList.toggle('active', isApp);
            logoutBtn.style.display = isApp ? 'block' : 'none';
            profileBtn.style.display = isApp ? 'block' : 'none';
            if (isApp) {
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userId').textContent = `ID: ${user.userId}`;
                profileName.textContent = user.displayName || 'User Name';
                profileId.textContent = user.userId || 'Unknown';
                profilePassword.textContent = user.password || '••••••••';
                loadFiles();
            } else {
                profileCard.classList.remove('active');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const userId = document.getElementById('loginId').value;
                const password = document.getElementById('loginPassword').value;
                user = await api('/users/login', {
                    userId,
                    password
                });
                user.password = password;
                localStorage.setItem('nexusUser', JSON.stringify(user));
                showView(true);
            } catch (err) {
                showMsg('authMessage', err.message, true);
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const displayName = document.getElementById('signupName').value;
                const password = document.getElementById('signupPassword').value;
                user = await api('/users/sign-in', {
                    displayName,
                    password
                });
                user.password = password;
                localStorage.setItem('nexusUser', JSON.stringify(user));
                showView(true);
            } catch (err) {
                showMsg('authMessage', err.message, true);
            }
        });

        passwordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                await api('/users/change-password', {
                    userId: user.userId,
                    currentPassword,
                    newPassword
                });
                user.password = newPassword;
                localStorage.setItem('nexusUser', JSON.stringify(user));
                profilePassword.textContent = newPassword;
                showMsg('passwordMessage', 'Password updated.');
                passwordForm.reset();
                passwordForm.classList.add('hidden');
            } catch (err) {
                showMsg('passwordMessage', err.message, true);
            }
        });

        changePasswordBtn.addEventListener('click', () => {
            passwordForm.classList.toggle('hidden');
        });

        cancelPasswordBtn.addEventListener('click', () => {
            passwordForm.classList.add('hidden');
        });

        logoutBtn.addEventListener('click', () => {
            user = null;
            localStorage.removeItem('nexusUser');
            showView(false);
        });

        function showMsg(id, text, isErr = false) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `message active ${isErr ? 'message-error' : 'message-success'}`;
            setTimeout(() => el.classList.remove('active'), 5000);
        }

        // File Management
        async function loadFiles() {
            try {
                const res = await fetch(`/file?userId=${user.userId}`);
                const files = await res.json();
                renderFiles(files);
            } catch (err) {
                console.error(err);
            }
        }

        function renderFiles(files) {
            if (files.length === 0) {
                fileList.innerHTML = '<div class="muted">No items in your collection yet.</div>';
                return;
            }
            fileList.innerHTML = files.map(file => `
            <div class="file-item">
                <div class="file-info">
                    <div class="file-details">
                        <h4>${file.fileName}</h4>
                        <div class="file-meta">${(file.fileSize / 1024 / 1024).toFixed(2)} MB • ${file.owner ? 'Owned' : 'Shared by ' + file.ownerDisplayName}</div>
                    </div>
                    <span class="badge ${file.owner ? 'badge-owner' : 'badge-received'}">${file.owner ? 'Owner' : 'Received'}</span>
                </div>
                
                ${file.owner ? `
                    <div class="share-tag-list">
                        ${file.sharedWithUsers.map(u => `
                            <div class="share-tag">
                                ${u.displayName}
                                <button onclick="revoke('${file.fileId}', '${u.userId}')">&times;</button>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}

                <div class="file-actions">
                    <a href="${file.downloadUrl}" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">Download</a>
                    ${file.owner ? `<button class="btn btn-ghost" onclick="toggleShare('${file.fileId}')" style="padding: 8px 16px; font-size: 0.85rem;">Share</button>` : ''}
                    ${file.owner ? `<button class="btn btn-danger" onclick="deleteFile('${file.fileId}')" style="padding: 8px 16px; font-size: 0.85rem;">Remove</button>` : ''}
                </div>

                <div id="share-${file.fileId}" class="share-input-group">
                    <input id="share-input-${file.fileId}" placeholder="Enter Recipient ID" style="flex: 1; padding: 8px 12px;">
                    <button class="btn btn-primary" onclick="shareFile('${file.fileId}')" style="padding: 8px 16px; font-size: 0.85rem;">Give Access</button>
                </div>
            </div>
        `).join('');
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);
            formData.append('userId', user.userId);

            showMsg('uploadMessage', 'Uploading to Nexus...');
            try {
                const res = await fetch('/file/upload', { method: 'POST', body: formData });
                if (!res.ok) throw new Error('Upload failed');
                showMsg('uploadMessage', 'File secured in your collection.');
                uploadForm.reset();
                loadFiles();
            } catch (err) {
                showMsg('uploadMessage', err.message, true);
            }
        });

        window.toggleShare = (id) => {
            document.getElementById(`share-${id}`).classList.toggle('active');
        };

        window.shareFile = async (fileId) => {
            const sharedWithUserId = document.getElementById(`share-input-${fileId}`).value;
            try {
                const res = await fetch('/file/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fileId, ownerUserId: user.userId, sharedWithUserId })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                loadFiles();
            } catch (err) {
                alert(err.message);
            }
        };

        window.revoke = async (fileId, sharedWithUserId) => {
            try {
                await fetch(`/file/${fileId}/share?ownerUserId=${user.userId}&sharedWithUserId=${sharedWithUserId}`, { method: 'DELETE' });
                loadFiles();
            } catch (err) {
                console.error(err);
            }
        };

        window.deleteFile = async (fileId) => {
            if (!confirm('Are you sure you want to remove this item from Nexus?')) return;
            try {
                await fetch(`/file/${fileId}?userId=${user.userId}`, { method: 'DELETE' });
                loadFiles();
            } catch (err) {
                console.error(err);
            }
        };

        refreshBtn.addEventListener('click', loadFiles);

        profileBtn.addEventListener('click', () => {
            profileCard.classList.toggle('hidden');
        });

        document.getElementById('closeProfileBtn').addEventListener('click', () => {
            profileCard.classList.add('hidden');
        });

        if (user) showView(true);
    </script>
</body>

</html>
